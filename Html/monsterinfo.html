<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลมอนสเตอร์ | 2dProjectTest Wiki</title>
    <!-- โหลดสไตล์หลักก่อน เพื่อให้ได้ฟอนต์และสไตล์องค์ประกอบพื้นฐานที่เหมือนหน้าอื่น -->
    <link rel="stylesheet" href="../Css/main.css">
    <!-- โหลดสไตล์หลักสำหรับหน้าวิกิโดยเฉพาะ (ยุบรวมจาก 3 ไฟล์) -->
    <link rel="stylesheet" href="../Css/wiki-layout.css?v=20">
    <!-- โหลด Editor.js และ Tools (Pin Versions เพื่อความเสถียร ป้องกันการแครช) -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.28.2" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@2.11.3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@1.9.0" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@2.9.0" crossorigin="anonymous"></script>
    <!-- Plugin สำหรับจัดหน้าซ้าย ขวา กลาง -->
    <script src="https://cdn.jsdelivr.net/npm/editorjs-text-alignment-blocktune@latest"></script>
    <!-- Plugin สำหรับเปลี่ยนสีและฟอนต์ -->
    <script src="https://cdn.jsdelivr.net/npm/editorjs-text-color-plugin@2.0.4/dist/bundle.js"></script>
</head>
<body>

    <!-- 1. แถบนำทางด้านบนสุด (Navbar) -->
    <div class="navbar">
        <div class="navbar-logo">2DProjectTest : Monster Info</div>

        <div class="navbar-profile">
            <!-- รูปโปรไฟล์ Avatar -->
            <div class="profile-avatar" id="userAvatar"></div>

            <!-- ดร็อปดาวน์ข้อมูลโปรไฟล์ -->
            <div class="dropdown">
                <button class="profile-btn" id="mainProfileBtn">Login</button>
                <div class="dropdown-content" id="dropdownMenu">
                    <div class="dropdown-panel">
                        <a href="profile.html">Profile</a>
                        <a href="#" onclick="logoutUser()" class="logout-btn">Logout</a>
                    </div>
                </div>
            </div>

            <!-- ดร็อปดาวน์การแจ้งเตือน -->
            <div class="noti-dropdown">
                <button class="noti-btn">
                    🔔<span class="noti-badge" id="notiCount" style="display:none;">0</span>
                </button>
                <div class="noti-dropdown-content" id="notiMenu">
                    <div class="noti-header" style="display: flex; justify-content: space-between; align-items: center; color: white; padding: 10px 15px;"><span style="font-family: 'Germania', sans-serif; font-size: 16px;">Notifications</span><span style="font-size: 12px; font-weight: normal; cursor: pointer; color: #e0e0e0; transition: 0.2s;" onmouseover="this.style.color='#ff9800'" onmouseout="this.style.color='#e0e0e0'" onclick="clearAllNotifications()">Clear All</span></div>
                    <div id="notiList">
                        <div style="padding: 15px; text-align: center; color: #888; font-size: 14px;">No new notifications</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. ส่วนแสดงข้อมูล 2 คอลัมน์ (Two-Column Layout) -->
    <div class="basicinfo-container">
        
        <!-- Sidebar ฝั่งซ้าย -->
        <div class="sidebar">
            <!-- ตัวเลือกจัดเรียง (Sort Dropdown) -->
            <div class="sort-container" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <div class="sort-label" style="background-color: #e0e0e0; color: #1e1e1e; padding: 0 15px; height: 38px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; border-radius: 20px; font-family: 'Germania', 'ChakraPetch', sans-serif; font-size: 16px; font-weight: bold;">
                    Sort by :
                </div>
                <div class="custom-sort-dropdown">
                    <button class="sort-btn" id="sortWikiBtn">
                        ⭐ Admin ▼
                    </button>
                    <div class="sort-dropdown-content">
                        <button onclick="changeWikiSort('admin')">⭐ Admin</button>
                        <button onclick="changeWikiSort('top')">🔥 Top Voted</button>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-box">
                <!-- พื้นที่เลื่อนแสดงรายการหัวข้อเนื้อหา -->
                <div class="sidebar-menu" id="sidebarMenu">
                    <div style="color: #888; font-size: 14px; text-align: center; padding: 20px;">Loading...</div>
                </div>
            </div>
            
            <!-- ปุ่มเพิ่มหน้าจะถูกซ่อนไว้เริ่มต้น และจะแสดงผ่าน JS เฉพาะเมื่อเป็นแอดมิน -->
            <button class="sidebar-admin-btn" id="adminSidebarBtn" onclick="openAddModal()" style="display: none;">
                Add New Page (Admin)
            </button>
        </div>

        <!-- Main Content ฝั่งขวา (ใช้พื้นที่ที่เหลือทั้งหมด) -->
        <div class="main-content">
            
            <!-- กล่องแสดงหัวเรื่อง (Title) -->
            <div class="content-title-card">
                <h2 class="content-title-text" id="contentTitleText">Title</h2>
                <!-- ปุ่มจัดการของแอดมิน (แก้ไข/ลบ) ซึ่งจะโชว์เฉพาะแอดมิน -->
                <div class="admin-action-group" id="adminActionGroup" style="display: none;">
                    <button class="admin-edit-btn" onclick="openEditModal()">✏️ Edit Page</button>
                    <button class="admin-delete-btn" onclick="deleteActiveWiki()">🗑️ Delete Page</button>
                </div>
            </div>

            <!-- กล่องขนาดใหญ่สำหรับแสดงเนื้อหา (Content) -->
            <div class="content-body-card" id="contentBodyText">
                Please wait, loading data...
            </div>
            
            <!-- ส่วนปฏิสัมพันธ์ (อัพโหวต & คอมเมนต์) จะถูกซ่อนไว้ถ้ายังไม่มีหน้าแสดงผล -->
            <div id="wikiInteractionSection" style="display: none; margin-top: 20px;">
                <div class="post-actions" style="margin-top: 0; border-top: none; padding-top: 0;">
                    <!-- ปุ่มโหวตและคอมเมนต์ -->
                    <button class="action-btn" id="wikiUpvoteBtn" onclick="toggleWikiUpvote()">
                        ⬆️ Upvote (<span id="wikiUpvoteCount">0</span>)
                    </button>
                    <!-- ปุ่มคอมเมนต์ -->
                    <button class="action-btn" id="wikiCommentBtn" onclick="toggleWikiCommentSection()">
                        💬 Comment (<span id="wikiCommentCount">0</span>)
                    </button>
                </div>

                <!-- โซนคอมเมนต์ (เปิด/ปิด ได้) -->
                <div class="comments-section" id="wikiCommentSection" style="display: none; background-color: #252526; border: 1px solid #333333; margin-top: 15px;">
                    <div class="comment-input-box">
                        <input type="text" id="wikiCommentInput" placeholder="Write a comment about this page..." onkeypress="if(event.key === 'Enter') submitWikiComment()">
                        <button onclick="submitWikiComment()">Send</button>
                    </div>
                    <div id="wikiCommentList">
                        <!-- รายการคอมเมนต์จะถูกดึงมาโชว์ที่นี่ -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 3. ปุ่มย้อนกลับลอยด้านล่างซ้าย (Floating Back Button) -->
    <button class="floating-back-btn" onclick="window.location.href='main.html'">◀ Back</button>

    <!-- ====================================================
       หน้าต่าง Modal สำหรับแอดมินจัดการข้อมูล (Modals)
       ==================================================== -->
    
    <!-- Modal: เพิ่มหน้าใหม่ -->
    <div class="modal-overlay" id="addWikiModal">
        <div class="modal-box">
            <h3>➕ Add New Wiki Page</h3>
            
            <div class="form-group">
                <label for="addTitleInput">Title</label>
                <input type="text" id="addTitleInput" class="form-input" placeholder="Enter title" style="font-family: 'Germania', 'ChakraPetch', sans-serif;">
            </div>
            
            <div class="form-group">
                <label for="addOrderInput">Order Number</label>
                <input type="number" id="addOrderInput" class="form-input" min="1" placeholder="Order e.g., 1, 2, 3" style="font-family: 'Germania', 'ChakraPetch', sans-serif;">
            </div>
            
            <div class="form-group">
                <label>Content</label>
                <!-- กล่องสำหรับ Editor.js -->
                <div id="addEditorContainer" class="editor-container"></div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                <button class="btn-save" onclick="submitAddWiki()">Save</button>
            </div>
        </div>
    </div>

    <!-- Modal: แก้ไขหน้าเดิม -->
    <div class="modal-overlay" id="editWikiModal">
        <div class="modal-box">
            <h3>✏️ Edit Wiki Page</h3>
            
            <div class="form-group">
                <label for="editTitleInput">Title</label>
                <input type="text" id="editTitleInput" class="form-input" placeholder="Enter title" style="font-family: 'Germania', 'ChakraPetch', sans-serif;">
            </div>
            
            <div class="form-group">
                <label for="editOrderInput">Order Number</label>
                <input type="number" id="editOrderInput" class="form-input" min="1" placeholder="Order" style="font-family: 'Germania', 'ChakraPetch', sans-serif;">
            </div>
            
            <div class="form-group">
                <label>Content</label>
                <!-- กล่องสำหรับ Editor.js -->
                <div id="editEditorContainer" class="editor-container"></div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-save" onclick="submitEditWiki()">Save</button>
            </div>
        </div>
    </div>

    <!-- กล่องแจ้งเตือนรวม (Custom Alert Overlay) -->
    <div id="customAlert" class="alert-overlay">
        <div class="alert-box">
            <h3 id="alertTitle">Alert</h3>
            <p id="alertMessage">Message will appear here</p>
            <button onclick="closeAlert()" class="alert-btn" style="width: auto;">OK</button>
        </div>
    </div>

    <!-- Modal: สำหรับหน้าต่างค้นหาและใส่ Wiki Link -->
    <div class="modal-overlay" id="wikiLinkModal" style="display: none; align-items: center; justify-content: center; z-index: 10000;">
        <div class="modal-box" style="width: 400px; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #fff;">🔗 Search Wiki Page</h3>
                <button onclick="closeWikiLinkModal()" style="background: none; border: none; color: #888; font-size: 16px; cursor: pointer;">✖</button>
            </div>
            <input type="text" id="wikiLinkSearchInput" class="form-input" placeholder="Type name to search..." oninput="filterWikiLinkResults(event)" style="font-family: 'Germania', 'ChakraPetch', sans-serif; width: 100%; box-sizing: border-box;">
            <div id="wikiLinkResultList" style="max-height: 250px; overflow-y: auto; margin-top: 15px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px;">
                <!-- Results will be rendered here -->
            </div>
        </div>
    </div>

    <!-- ====================================================
       โหลดสคริปต์ Supabase และไฟล์การทำงาน
       ==================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="../Js/wiki-tool.js"></script>
    <script src="../Js/monsterinfo.js?v=4"></script>
</body>
</html>
