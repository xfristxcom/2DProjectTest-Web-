<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตั้งรหัสผ่านใหม่ | 2dProjectTest Wiki</title>
    <link rel="stylesheet" href="../Css/main.css">
    <link rel="stylesheet" href="../Css/login.css">
</head>
<body>

    <div class="login-container">
        <h1>Set New Password</h1>
        <p style="font-size:13px; color:#a0a0b5; margin-bottom:15px;">กรุณาตั้งรหัสผ่านใหม่ (อย่างน้อย 6 ตัวอักษร)</p>
        <form>
            <input type="password" id="newPasswordInput" placeholder="รหัสผ่านใหม่">
            <input type="password" id="confirmPasswordInput" placeholder="ยืนยันรหัสผ่านใหม่">

            <button type="button" class="login-btn" onclick="updateNewPassword()">บันทึกรหัสผ่าน</button>
            
            <a href="login.html" class="text-link">กลับไปหน้าเข้าสู่ระบบ</a>
        </form>
    </div>

    <div id="customAlert" class="alert-overlay">
        <div class="alert-box">
            <h3 id="alertTitle">Notice</h3>
            <p id="alertMessage">ข้อความจะแสดงตรงนี้</p>
            <button onclick="closeAlert()" class="alert-btn" style="width: auto;">OK</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Js/login.js"></script>
</body>
</html>
